<div class="login-container">
  <mat-card>
    <mat-tab-group>
      <mat-tab label="Login">
        <form (ngSubmit)="onLogin()" class="auth-form">
          <mat-form-field appearance="fill">
            <mat-label>Email</mat-label>
            <input matInput type="email" [(ngModel)]="loginData.email" name="email" required />
          </mat-form-field>
          <mat-form-field appearance="fill">
            <mat-label>Password</mat-label>
            <input
              matInput
              type="password"
              [(ngModel)]="loginData.password"
              name="password"
              required
            />
          </mat-form-field>
          <button mat-raised-button color="primary" type="submit">Login</button>
        </form>
      </mat-tab>
      <mat-tab label="Register">
        <form (ngSubmit)="onRegister()" class="auth-form">
          <mat-form-field appearance="fill">
            <mat-label>Email</mat-label>
            <input matInput type="email" [(ngModel)]="registerData.email" name="email" required />
          </mat-form-field>
          <mat-form-field appearance="fill">
            <mat-label>Password</mat-label>
            <input
              matInput
              type="password"
              [(ngModel)]="registerData.password"
              name="password"
              required
            />
            </mat-form-field>
          <mat-form-field appearance="fill">
            <mat-label>Firstname</mat-label>
            <input
              matInput
              [(ngModel)]="registerData.firstName" name="firstName" />
          </mat-form-field>
          <mat-form-field appearance="fill">
            <mat-label>Lastname</mat-label>
            <input
              matInput
              [(ngModel)]="registerData.lastName" name="lastName" />
          </mat-form-field>
          <mat-form-field appearance="fill">
            <mat-label>Surname</mat-label>
            <input
              matInput
              [(ngModel)]="registerData.surName" name="surName" />
          </mat-form-field>
          <p>Fields marked with * are mandatory.</p>
          <button mat-raised-button color="accent" type="submit">Register</button>
        </form>
      </mat-tab>
    </mat-tab-group>
  </mat-card>
</div>
