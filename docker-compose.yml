services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: flexdesk
      POSTGRES_USER: flexdesk_admin
      POSTGRES_PASSWORD: "465464"
    ports:
      - "5432:5432"
    volumes:
      - flexdesk_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flexdesk_admin -d flexdesk"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  flexdesk_data:
